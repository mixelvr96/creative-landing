# ──────────────────────────────────────────────────
# зорка.рф/landing-creative  —  static landing page
#
# Вставь эти два блока ВНУТРЬ существующего server {} (https, 443)
# в файле /etc/nginx/conf.d/zorka.conf (или там, где лежит zorka.conf)
# ПЕРЕД блоком  location / { proxy_pass ... }
# ──────────────────────────────────────────────────

# Redirect без слеша → со слешем
location = /landing-creative {
    return 301 /landing-creative/;
}

# ^~ перебивает regex-локации (js/css/mp4/webp...) из основного конфига
location ^~ /landing-creative/ {
    root /var/www;
    index index.html;
    try_files $uri $uri/ /landing-creative/index.html;

    # HTML — без кэша
    location ~* \.html$ {
        root /var/www;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # CSS / JS — 30 дней
    location ~* \.(css|js)$ {
        root /var/www;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Шрифты — 1 год
    location ~* \.(woff2?|otf|ttf|eot)$ {
        root /var/www;
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
    }

    # Картинки — 30 дней
    location ~* \.(webp|jpg|jpeg|png|svg|ico|gif)$ {
        root /var/www;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
    }

    # Видео — 30 дней + range requests для перемотки
    location ~* \.(mp4|webm)$ {
        root /var/www;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public" always;
        add_header Accept-Ranges bytes always;
        access_log off;
    }
}
